name: Manual Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: Safe diagnostic or explicit attendance action
        required: true
        default: CHECK_ATTENDANCE
        type: choice
        options:
          - CHECK_ATTENDANCE
          - PUNCH_IN
          - PUNCH_OUT
          - ROTATE_PASSWORD
          - SYNC_CREDENTIAL
          - VERIFY_SESSION
      confirmation:
        description: Enter I_UNDERSTAND for a live attendance or rotation action
        required: false
        type: string

concurrency:
  group: manual-attendance-${{ inputs.action }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate live-action confirmation
        env:
          ACTION: ${{ inputs.action }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          case "$ACTION" in
            PUNCH_IN|PUNCH_OUT|ROTATE_PASSWORD|SYNC_CREDENTIAL)
              test "$CONFIRMATION" = "I_UNDERSTAND" || { echo "Live action requires confirmation=I_UNDERSTAND"; exit 1; }
              ;;
          esac

  run:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: production
      ADP_USERNAME: ${{ secrets.ADP_USERNAME }}
      ADP_ACCOUNT_ID: ${{ secrets.ATTENDANCE_ACCOUNT_ID }}
      ADP_STORE_KEY: ${{ secrets.ADP_STORE_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
      ADP_TEMP_PASSWORD: ${{ secrets.ADP_TEMP_PASSWORD }}
      ATTENDANCE_LATITUDE: ${{ secrets.ATTENDANCE_LATITUDE }}
      ATTENDANCE_LONGITUDE: ${{ secrets.ATTENDANCE_LONGITUDE }}
      ATTENDANCE_LOCATION_ACCURACY_METERS: ${{ secrets.ATTENDANCE_LOCATION_ACCURACY_METERS }}
      PORTAL_SELECTORS_VERIFIED: ${{ vars.PORTAL_SELECTORS_VERIFIED || 'false' }}
      MANUAL_HOLIDAYS: ${{ vars.MANUAL_HOLIDAYS }}
      MANUAL_LEAVE_DATES: ${{ vars.MANUAL_LEAVE_DATES }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      MANUAL_ACTION: ${{ inputs.action }}
      AUTOMATION_ENABLED: ${{ (inputs.action == 'PUNCH_IN' || inputs.action == 'PUNCH_OUT') && 'true' || 'false' }}
      DRY_RUN: ${{ (inputs.action == 'PUNCH_IN' || inputs.action == 'PUNCH_OUT') && 'false' || 'true' }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
      - name: Run supported diagnostic or action
        shell: bash
        run: |
          case "$MANUAL_ACTION" in
            PUNCH_IN)
              npm run rotation
              PUNCH_IN_TIME="$(TZ=Asia/Kolkata date +%H:%M)" AUTOMATION_ACTION=PUNCH_IN npm run job
              ;;
            PUNCH_OUT)
              npm run rotation
              PUNCH_OUT_TIME="$(TZ=Asia/Kolkata date +%H:%M)" AUTOMATION_ACTION=PUNCH_OUT npm run job
              ;;
            CHECK_ATTENDANCE)
              AUTOMATION_ACTION=PUNCH_IN npm run job ;;
            SYNC_CREDENTIAL)
              test -n "$ADP_TEMP_PASSWORD" || { echo "ADP_TEMP_PASSWORD is not configured"; exit 1; }
              ADP_PASSWORD="$ADP_TEMP_PASSWORD" CREDENTIAL_REPLACEMENT_CONFIRM=I_UNDERSTAND npm run credential:replace
              ;;
            ROTATE_PASSWORD)
              npm run rotation ;;
            VERIFY_SESSION)
              AUTOMATION_ACTION=PUNCH_IN npm run job ;;
          esac
      - name: Upload sanitized failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manual-failure-${{ github.run_id }}
          path: failure/
          if-no-files-found: ignore
          retention-days: 7
