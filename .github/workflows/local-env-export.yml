name: One-time encrypted local environment export

on:
  workflow_dispatch:
    inputs:
      certificate_base64:
        description: Base64 encoded recipient certificate
        required: true
        type: string
      confirmation:
        description: Enter EXPORT_ENCRYPTED_ENV
        required: true
        type: string

permissions:
  contents: read

jobs:
  export:
    if: inputs.confirmation == 'EXPORT_ENCRYPTED_ENV'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CERTIFICATE_BASE64: ${{ inputs.certificate_base64 }}
      ADP_USERNAME: ${{ secrets.ADP_USERNAME }}
      ADP_ACCOUNT_ID: ${{ secrets.ATTENDANCE_ACCOUNT_ID }}
      ADP_STORE_KEY: ${{ secrets.ADP_STORE_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
      ATTENDANCE_LATITUDE: ${{ secrets.ATTENDANCE_LATITUDE }}
      ATTENDANCE_LONGITUDE: ${{ secrets.ATTENDANCE_LONGITUDE }}
      ATTENDANCE_LOCATION_ACCURACY_METERS: ${{ secrets.ATTENDANCE_LOCATION_ACCURACY_METERS }}
    steps:
      - name: Encrypt local environment for this workstation
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > recipient.pem
          cat > local.env <<EOF
          NODE_ENV=development
          APP_TIMEZONE=Asia/Kolkata
          ADP_USERNAME=$ADP_USERNAME
          ADP_LOGIN_URL=https://infoservices.securtime.adp.com/login?redirectUrl=%2Fwelcome
          ADP_ACCOUNT_ID=$ADP_ACCOUNT_ID
          ATTENDANCE_LATITUDE=$ATTENDANCE_LATITUDE
          ATTENDANCE_LONGITUDE=$ATTENDANCE_LONGITUDE
          ATTENDANCE_LOCATION_ACCURACY_METERS=$ATTENDANCE_LOCATION_ACCURACY_METERS
          MONGODB_URI=$MONGODB_URI
          MONGODB_DATABASE=$MONGODB_DATABASE
          ADP_STORE_KEY=$ADP_STORE_KEY
          AUTOMATION_ENABLED=false
          DRY_RUN=true
          HEADLESS=true
          PORTAL_SELECTORS_VERIFIED=true
          EOF
          openssl smime -encrypt -binary -aes-256-cbc -in local.env -outform DER -out local.env.p7m recipient.pem
          shred --remove local.env recipient.pem
      - uses: actions/upload-artifact@v4
        with:
          name: encrypted-local-env-${{ github.run_id }}
          path: local.env.p7m
          if-no-files-found: error
          retention-days: 1
